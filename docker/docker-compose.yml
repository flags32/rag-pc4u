services:
  # 1. Ton API principale (Interface de Chat / Haystack)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      OLLAMA_HOST: "http://192.168.204.21:11434"
      OLLAMA_EMBED_MODEL: "bge-m3:latest"
      OLLAMA_LLM_MODEL: "qwen2.5:14b"
      QDRANT_HOST: "192.168.204.20"
      QDRANT_PORT: "6333"
    restart: unless-stopped

  # 2. Ton Dashboard de synchronisation Nextcloud
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-dashboard
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      # On passe les mêmes configurations pour que le watcher sache où injecter les données
      OLLAMA_HOST: "http://192.168.204.21:11434"
      OLLAMA_EMBED_MODEL: "bge-m3:latest"
      OLLAMA_LLM_MODEL: "qwen2.5:14b"
      QDRANT_HOST: "192.168.204.20"
      QDRANT_PORT: "6333"
    # ICI C'EST LA MAGIE : On écrase le CMD par défaut du Dockerfile
    # pour lancer ton script de dashboard à la place
    command: ["uv", "run", "python", "-m", "rag_pc4u.dashboard.run_dashboard"]
    restart: unless-stopped
    depends_on:
      - api