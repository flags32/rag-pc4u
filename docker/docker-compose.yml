services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # On injecte les IPs de tes LXC Proxmox pour surcharger proprement la configuration
      OLLAMA_HOST: "http://192.168.204.21:11434"
      OLLAMA_EMBED_MODEL: "bge-m3:latest"
      OLLAMA_LLM_MODEL: "qwen2.5:14b"

      QDRANT_HOST: "192.168.204.20"
      QDRANT_PORT: "6333"
    restart: unless-stopped